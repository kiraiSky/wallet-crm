<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcola Balancete · Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-pattern {
      background-image: radial-gradient(circle at 25% 25%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
    }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 bg-pattern flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500 rounded-2xl shadow-lg shadow-emerald-500/30 mb-4">
        <i data-lucide="wallet" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-2xl font-bold text-zinc-900">Marcola Balancete</h1>
      <p class="text-zinc-500 text-sm mt-1">Gestão de caixa da oficina</p>
    </div>

    <!-- Card de login -->
    <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-8">
      <h2 class="text-xl font-semibold text-zinc-900 mb-6">Entrar na conta</h2>

      <form onsubmit="event.preventDefault(); window.location='dashboard.html'" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1.5">E-mail</label>
          <div class="relative">
            <i data-lucide="mail" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
            <input type="email" required value="joao@marcola.com"
                   class="w-full pl-10 pr-3 py-2.5 bg-zinc-50 border border-zinc-200 rounded-lg focus:bg-white focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1.5">Senha</label>
          <div class="relative">
            <i data-lucide="lock" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
            <input type="password" required value="••••••••"
                   class="w-full pl-10 pr-3 py-2.5 bg-zinc-50 border border-zinc-200 rounded-lg focus:bg-white focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 text-zinc-600 cursor-pointer">
            <input type="checkbox" class="rounded border-zinc-300 text-emerald-500 focus:ring-emerald-500" checked />
            Lembrar de mim
          </label>
          <a href="#" class="text-emerald-600 hover:text-emerald-700 font-medium">Esqueci a senha</a>
        </div>

        <button type="submit"
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 rounded-lg shadow-sm shadow-emerald-500/20 transition">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-zinc-400 mt-6">
      v0.1 · protótipo visual
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
